[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.filesystem = spiffs
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

extra_scripts =
    pre:../scripts/patch_version.py
    pre:../scripts/patch_lvgl.py
    pre:../scripts/build_frontend.py

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -DASYNCWEBSERVER_REGEX=1
    ; PubSubClient default is 256 bytes — Bambu reports are routinely 4–16 KB
    -DMQTT_MAX_PACKET_SIZE=16384
    -DMQTT_KEEPALIVE=30
    -std=c++17
    -std=gnu++17
    -I include

build_unflags =
    -std=gnu++11

; Frameworks we depend on. Keep the scale's versions where they overlap so
; platform patches and bug fixes are shared.
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.3.1
    mathieucarbou/ESP Async WebServer@^3.0.6
    esphome/AsyncTCP-esphome@^2.1.4
    adafruit/Adafruit PN532@^1.3.4
    adafruit/Adafruit BusIO@^1.16.3
    knolleary/PubSubClient@^2.8
    links2004/WebSockets@^2.6.1

monitor_speed = 115200
upload_speed = 921600
