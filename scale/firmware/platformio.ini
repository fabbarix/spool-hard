[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.filesystem = spiffs

extra_scripts =
    pre:../scripts/patch_version.py
    pre:../scripts/build_frontend.py

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    ; Required for the regex routes used in web_server.cpp
    ; (`/api/crashes/<seq>`, `/api/users/<id>` etc). The console always
    ; had this set; scale was silently missing it on 3.0.6 (route fell
    ; through to literal /api/crashes); on 3.11+ the lib hard-errors
    ; at compile time when pathArg() is used without it.
    -DASYNCWEBSERVER_REGEX=1
    ; Per-product identity for spoolhard_core (shared lib). PRODUCT_ID lands
    ; in the firmware/SPIFFS signature bytes; OTA_DEFAULT_URL is the manifest
    ; pull URL the OTA module starts with (overridable via Config UI).
    -DPRODUCT_ID=\"spoolscale\"
    -DPRODUCT_NAME=\"SpoolHard\ Scale\"
    -DOTA_DEFAULT_URL=\"https://github.com/fabbarix/spool-hard/releases/latest/download/spoolhard-scale-manifest.json\"
    -std=c++17
    -std=gnu++17

build_unflags =
    -std=gnu++11

; Pull in the shared firmware library that lives under shared/firmware/.
lib_extra_dirs =
    ../../shared/firmware

lib_deps =
    bogde/HX711@^0.7.5
    adafruit/Adafruit PN532@^1.3.4
    adafruit/Adafruit BusIO@^1.16.3
    adafruit/Adafruit NeoPixel@^1.12.3
    bblanchon/ArduinoJson@^7.3.1
    ; ESP32Async fork — successor to mathieucarbou's. v3.10.0 refactored
    ; the WebSocket send/queue path (20–60 msg/s without queue overflow);
    ; v3.11.0 flipped CloseClientOnQueueFull to false by default with
    ; explicit guidance: applications check status on send and apply
    ; their own backpressure. Together these address the queue-fill
    ; close cycle we hit with mathieucarbou/3.0.6 + AsyncTCP-esphome.
    esp32async/AsyncTCP@^3.4.10
    esp32async/ESPAsyncWebServer@^3.11.0

monitor_speed = 115200
upload_speed = 921600
