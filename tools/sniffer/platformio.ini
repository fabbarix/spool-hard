; Wi-Fi air sniffer for the spoolhard console<->scale link.
; Locks to 2.4 GHz channel 2 in promiscuous mode and prints one line per
; 802.11 DATA / MGMT frame whose addresses involve the AP BSSID and either
; the console or the scale STA MAC. Output is captured over USB CDC on
; /dev/ttyACM0 and post-processed by tools/sniffer/analyze.py.

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -std=c++17
    -std=gnu++17

build_unflags =
    -std=gnu++11

monitor_speed = 921600
upload_speed = 921600
