name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for OTA manifest download links'
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine base URL
        id: url
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            echo "base_url=${{ github.event.inputs.base_url }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "base_url=https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://PLACEHOLDER" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release
        run: |
          ./scripts/release.sh \
            --base-url "${{ steps.url.outputs.base_url }}" \
            --output-dir release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spoolhard-scale-${{ steps.version.outputs.tag }}
          path: release/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/firmware.bin
            release/spiffs.bin
            release/manifest.json
          body: |
            ## SpoolHard Scale ${{ steps.version.outputs.tag }}

            ### Installation

            **Via browser upload:** Open `http://<scale-ip>/` > Configuration > Direct Upload, then drop the `.bin` files.

            **Via serial:**
            ```bash
            esptool.py --chip esp32s3 write_flash 0x10000 firmware.bin
            esptool.py --chip esp32s3 write_flash 0x610000 spiffs.bin
            ```

            **Via OTA:** Point the scale's OTA URL to this release's manifest:
            ```
            ${{ steps.url.outputs.base_url }}/manifest.json
            ```

            ### Artifacts
            | File | Description |
            |------|-------------|
            | `firmware.bin` | Backend firmware (ESP32-S3) |
            | `spiffs.bin` | Frontend SPIFFS image (React SPA) |
            | `manifest.json` | OTA update manifest |
