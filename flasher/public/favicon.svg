<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- SpoolHard Console favicon. Variant of the scale mark — same amber
       spool, but enclosed in a teal screen bezel rather than sitting on
       a platform. The console *displays* what the scale *weighs*, so the
       teal element wraps the amber instead of supporting it.
       Stroke is intentionally thick (4 of 64 = ~1 px at 16×16) so the
       frame survives anti-aliasing in a browser tab. Palette per
       docs/UI_UX_DESIGN_SYSTEM.md:
         #0b1220 — instrument-panel dark
         #f0b429 — amber "data"
         #2dd4bf — teal "OK / health" -->

  <!-- Dark rounded-square canvas (matches the scale variant). -->
  <rect width="64" height="64" rx="14" fill="#0b1220"/>

  <!-- Teal screen bezel — the console as a display surface. -->
  <rect x="4" y="6" width="56" height="52" rx="6"
        fill="none" stroke="#2dd4bf" stroke-width="4"/>

  <!-- Amber filament spool inside the screen. Slightly smaller than the
       scale variant so the bezel has breathing room around it. -->
  <rect x="20" y="16" width="24" height="5" rx="1" fill="#f0b429"/>
  <rect x="23" y="21" width="18" height="18"        fill="#f0b429"/>
  <rect x="20" y="39" width="24" height="5" rx="1" fill="#f0b429"/>
</svg>
